name: Build and Push Adhan API Docker Image

on:
  push:
    branches:
      - main
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # cities.db is git-ignored (built from GeoNames), so cache the generated
      # file between runs and only rebuild it on a cache miss.
      - name: Restore cached cities.db
        id: restore-db
        uses: actions/cache@v5
        with:
          path: backend/src/data/cities.db
          key: cities-db-${{ hashFiles('backend/scripts/build_cities_db.py') }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: backend/.python-version

      # Build the compact cities table so the image ships with working city
      # search / reverse-geocode (cities1000 = populated places >= 1000 pop).
      - name: Generate cities.db (cache miss)
        if: steps.restore-db.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o /tmp/cities1000.zip https://download.geonames.org/export/dump/cities1000.zip
          unzip -o /tmp/cities1000.zip -d /tmp
          python3 backend/scripts/build_cities_db.py \
            --source /tmp/cities1000.txt \
            --out backend/src/data/cities.db \
            --min-population 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Extract version
        run: |
          VERSION=$(grep -Po '(?<=^version = ")[^"]*' backend/pyproject.toml)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          # arm64 (Pi 4/5 64-bit) + amd64 are verified. arm/v7 (32-bit Pi) is
          # omitted — the Python/Node build chain is unreliable under QEMU there;
          # re-add "linux/arm/v7" if you run a 32-bit OS.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            aminekun90/adhan-api:latest
            aminekun90/adhan-api:${{ env.VERSION }}
          cache-from: type=registry,ref=aminekun90/adhan-api:cache
          cache-to: type=registry,ref=aminekun90/adhan-api:cache,mode=max
